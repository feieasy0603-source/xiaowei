services:
  mysql:
    image: mysql:8.0
    container_name: xiaowei-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-xiaowei}
      MYSQL_USER: ${MYSQL_USER:-xiaowei}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./xiaowei-server
      dockerfile: Dockerfile
    container_name: xiaowei-server
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod,mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-xiaowei}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PAY_CALLBACK_SECRET: ${PAY_CALLBACK_SECRET}
      PAYMENT_MOCK_ENABLED: ${PAYMENT_MOCK_ENABLED:-false}
      REFERRAL_FRONTEND_BASE_URL: ${REFERRAL_FRONTEND_BASE_URL:-http://localhost/}
      XIAOWEI_RATE_LIMIT_LOOKUP_MAX: ${XIAOWEI_RATE_LIMIT_LOOKUP_MAX:-30}
      WECHAT_PAY_ENABLED: ${WECHAT_PAY_ENABLED:-false}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_API_V3_KEY: ${WECHAT_API_V3_KEY:-}
      WECHAT_SERIAL_NO: ${WECHAT_SERIAL_NO:-}
      WECHAT_PRIVATE_KEY_PEM: ${WECHAT_PRIVATE_KEY_PEM:-}
      WECHAT_NOTIFY_URL: ${WECHAT_NOTIFY_URL:-}
      ALIPAY_PAY_ENABLED: ${ALIPAY_PAY_ENABLED:-false}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY_PEM: ${ALIPAY_PRIVATE_KEY_PEM:-}
      ALIPAY_PUBLIC_KEY_PEM: ${ALIPAY_PUBLIC_KEY_PEM:-}
      ALIPAY_GATEWAY_URL: ${ALIPAY_GATEWAY_URL:-https://openapi.alipay.com/gateway.do}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - upload_data:/app/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/products >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: xiaowei-web
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: xiaowei-admin/Dockerfile
    container_name: xiaowei-admin
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: xiaowei-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mysql_data:
  upload_data:
